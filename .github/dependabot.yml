version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"

    schedule:
      interval: weekly
      day: monday

    cooldown:
      default-days: 7

    groups:
      misc:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: github-actions
    directory: "/"

    schedule:
      interval: weekly
      day: monday

    cooldown:
      default-days: 7
